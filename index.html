<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learnix App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">

    <header class="top-stats">
      <div class="stat">🧬 <span>1</span></div>
      <div class="stat faded">🔥 <span>0</span></div>
      <div class="stat">💎 <span>680</span></div>
      <div class="stat">⚡ <span>∞</span></div>
    </header>

    <section class="unit-card">
      <div>
        <p>SECTION 1, UNIT 1</p>
        <h1>Biology Basics</h1>
      </div>

      <button class="unit-btn">☰</button>
    </section>

    <section class="path">

      <button class="lesson active">
        ★
      </button>

      <button class="lesson">
        ★
      </button>

      <div class="chest">🎁</div>

      <button class="lesson locked">
        ★
      </button>

      <div class="boss">🧠</div>

      <button class="lesson locked big">
        !
      </button>

    </section>

    <div class="unit-title">
      <span></span>
      <p>Cells and Life</p>
      <span></span>
    </div>

  </main>

  <nav class="bottom-nav">
    <button class="selected">🏠</button>
    <button>📚</button>
    <button>🏆</button>
    <button>💬</button>
    <button>⚙️</button>
  </nav>

</body>
</html>
